# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

title: Zichuan Fu's Homepage
description: >- # this means to ignore newlines until "baseurl:"
  Bay is a minimal Jekyll Theme.
baseurl: "" # the subpath of the site
url: "https://fzkuji.github.io" # the base hostname & protocol for the site
og_image: /assets/img/profile-pic.jpg
google_analytics: "UA-121636368-3"
openai-domain-verification: dv-DP6CfXPwdpwd3Zj3tbWrZAVn

header:
  pages:
    - name: Home
      slug: /
    - name: Work
    - name: Blog

footer:
  show_powered_by: true
  contact:
    - name: Email
      value: fzkuji@gmail.com
      link: mailto:fzkuji@gmail.com
    - name: WeChat
      value: FZKUJI
      link: "#"
  follow:
    - name: Twitter
      link: https://twitter.com/fzkuji
      username: "Fzkuji"
    - name: Facebook
      link: https://www.facebook.com/zichuan.fu/
    - name: LinkedIn
      link: https://www.linkedin.com/in/fzkuji/
    - name: GitHub
      link: https://github.com/FZKUJI
    - name: Dribbble
      link: https://dribbble.com/YourDribbbleUsername
    - name: RSS
      link: /feed.xml

# Build settings
markdown: kramdown
sass:
    style: :compressed
plugins:
  - jekyll-feed

# Excluded items
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - feed.xml
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Used for defeating caching
version: 1
